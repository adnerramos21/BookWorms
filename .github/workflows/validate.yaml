# .github/workflows/validate.yml
name: PR Validator — Dry Run + Apex Tests

on:
  pull_request:
    branches:
      - main  # Only fires on PRs targeting main

jobs:
  validate:
    name: Validate Delta Against Sandbox
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SGD needs full history to diff branches

      - name: Install Salesforce CLI
        run: |
          curl -fsSL https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz \
            | tar xJ --strip-components=1 -C /usr/local
          sf --version

      - name: Install sfdx-git-delta
        run: |
          echo "y" | sf plugins install sfdx-git-delta
          sf sgd --version

      - name: Authenticate to Salesforce via JWT
        run: |
          echo "${{ secrets.SERVER_KEY }}" | base64 --decode > /tmp/server.key
          sf org login jwt \
            --client-id      ${{ secrets.SF_CONSUMER_KEY }} \
            --jwt-key-file   /tmp/server.key \
            --username       ${{ secrets.SF_USERNAME }} \
            --instance-url   ${{ secrets.SF_INSTANCE_URL }} \
            --set-default \
            --alias          bookworms

      - name: Generate delta package
        run: |
          mkdir -p delta-package
          sf sgd source delta \
            --from "origin/main" \
            --to   "HEAD" \
            --output ./delta-package \
            --generate-delta
          echo "── package.xml contents ──"
          cat ./delta-package/package/package.xml

      - name: Validate (dry-run) with Apex tests
        run: |
          sf project deploy validate \
            --manifest    ./delta-package/package/package.xml \
            --target-org  bookworms \
            --test-level  RunLocalTests \
            --wait        30