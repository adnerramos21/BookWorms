<template>
    <lightning-modal-header label={modalTitle}></lightning-modal-header>

    <lightning-modal-body>
        <lightning-record-edit-form
            object-api-name="Reservation__c"
            onsuccess={handleSuccess}
            onerror={handleError}>

            <lightning-messages></lightning-messages>

            <lightning-input-field field-name="Name"
                value={bookRowReservationName}>
            </lightning-input-field>

            <lightning-input-field field-name="Book__c"
                value={bookRow.id}>
            </lightning-input-field>

            <lightning-input-field field-name="Status__c">
            </lightning-input-field>

            <lightning-input-field field-name="Reservation_Date__c">
            </lightning-input-field>

            <lightning-input-field field-name="Expiration_Date__c">
            </lightning-input-field>

            <lightning-input-field field-name="Contact__c">
            </lightning-input-field>

            <lightning-input-field field-name="Pickup_Contact__c">
            </lightning-input-field>

        </lightning-record-edit-form>
    </lightning-modal-body>

    <lightning-modal-footer>
        <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
        <span class="slds-p-left_medium"></span>
        <lightning-button variant="brand" label="Reserve" onclick={handleSubmit}></lightning-button>
    </lightning-modal-footer>
</template>
